# Apache VirtualHost pro artewu.com
#
# Tento soubor je nasazován skriptem bin/deploy.sh, který nahradí token
# __WEBROOT__ skutečnou cestou k adresáři `dist/` v checkoutu repozitáře
# (typicky /srv/www/artewu.com/dist).
#
# Vyžaduje povolené moduly:
#   sudo a2enmod rewrite headers expires deflate
#
# Pro HTTPS po vystavení certifikátu spusť:
#   sudo certbot --apache -d artewu.com -d www.artewu.com

<VirtualHost *:80>
    ServerName artewu.com
    ServerAlias www.artewu.com

    DocumentRoot __WEBROOT__

    <Directory __WEBROOT__>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # Pretty URLs: zkusíme přesný soubor, pak .html, pak /index.html
        RewriteEngine On

        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_FILENAME}.html -f
        RewriteRule ^(.*)$ $1.html [L]

        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME}/index.html -f
        RewriteRule ^(.*)$ $1/index.html [L]
    </Directory>

    ErrorDocument 404 /404.html

    # Komprese
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE application/javascript application/json application/xml
        AddOutputFilterByType DEFLATE image/svg+xml font/ttf font/otf
    </IfModule>

    # Cache podle typu
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/html               "access plus 0 seconds"
        ExpiresByType text/css                "access plus 30 days"
        ExpiresByType application/javascript  "access plus 30 days"
        ExpiresByType image/svg+xml           "access plus 30 days"
        ExpiresByType image/png               "access plus 30 days"
        ExpiresByType image/jpeg              "access plus 30 days"
        ExpiresByType image/webp              "access plus 30 days"
        ExpiresByType image/avif              "access plus 30 days"
        ExpiresByType font/woff2              "access plus 1 year"
    </IfModule>

    # Hashované Astro assety — immutable cache
    <IfModule mod_headers.c>
        <LocationMatch "^/_astro/">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </LocationMatch>

        # Bezpečnostní hlavičky
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    </IfModule>

    # Skryté soubory nikdy neservírovat
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    ErrorLog  ${APACHE_LOG_DIR}/artewu.com_error.log
    CustomLog ${APACHE_LOG_DIR}/artewu.com_access.log combined
</VirtualHost>
