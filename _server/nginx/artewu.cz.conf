# Nginx site config for artewu.cz
#
# Tento soubor je nasazován skriptem bin/deploy.sh, který nahradí token
# __WEBROOT__ skutečnou cestou k adresáři `dist/` v checkoutu repozitáře
# (typicky /srv/www/artewu.cz/dist).
#
# Pro zapnutí HTTPS po vystavení certifikátu spusť:
#   sudo certbot --nginx -d artewu.cz -d www.artewu.cz
# Certbot tento konfigurák sám upraví a doplní SSL blok.

server {
    listen 80;
    listen [::]:80;
    server_name artewu.cz www.artewu.cz;

    root __WEBROOT__;
    index index.html;

    # Pretty URLs: Astro generuje /stranka/index.html
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # Hashované assety z Astro buildu — agresivní cache
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Statika (kromě HTML)
    location ~* \.(?:css|js|mjs|woff2?|ttf|otf|eot|svg|jpg|jpeg|png|gif|webp|avif|ico|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # HTML necachovat — ať se po deploy hned objeví nový obsah
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    error_page 404 /404.html;

    # Komprese
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/ttf
        font/otf;

    # Bezpečnostní hlavičky
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Skryté soubory (.git, .env, ...) — nikdy neservírovat
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/artewu.cz.access.log;
    error_log  /var/log/nginx/artewu.cz.error.log;
}
